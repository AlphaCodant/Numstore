<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NumStore{% endblock %}</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/img/logo-numstore.png">
    <link rel="apple-touch-icon" href="/img/logo-numstore.png">
    <link href="/css/styles.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-noir min-h-screen">
    <!-- Navigation -->
    <nav class="glass-nav">
        <div class="max-w-7xl mx-auto px-6 lg:px-12">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center gap-3" data-testid="navbar-logo-link">
                    <img src="/img/logo-numstore.png" alt="NumStore Logo" class="h-10 w-auto" data-testid="navbar-logo-image">
                    <span class="font-heading text-xl tracking-tight">NumStore</span>
                </a>
                <div class="flex items-center gap-6">
                    <a href="/access" class="text-sm text-muted transition-colors" data-testid="nav-access-link">
                        J'ai un code
                    </a>
                    <a href="/admin" class="text-sm text-muted transition-colors" data-testid="nav-admin-link">
                        Admin
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t py-12 mt-16">
        <div class="max-w-7xl mx-auto px-6 lg:px-12">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <img src="/img/logo-numstore.png" alt="NumStore Logo" class="h-8 w-auto" data-testid="footer-logo-image">
                    <span class="font-heading text-lg">NumStore</span>
                </div>
                <p class="text-xs text-muted">
                    Produits Numériques & Services Professionnels
                </p>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
