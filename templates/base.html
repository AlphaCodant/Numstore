<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NumStore{% endblock %}</title>
    <link href="/css/styles.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-noir min-h-screen text-white">
    <!-- Navigation -->
    <nav class="glass-nav sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 lg:px-12">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center gap-3 group">
                    <div class="w-8 h-8 bg-champagne flex items-center justify-center">
                        <i data-lucide="sparkles" class="w-4 h-4 text-noir"></i>
                    </div>
                    <span class="font-heading text-xl font-semibold tracking-tight text-white group-hover:text-champagne transition-colors">
                        NumStore
                    </span>
                </a>
                <div class="flex items-center gap-6">
                    <a href="/access" class="text-sm font-medium text-zinc-400 hover:text-champagne transition-colors tracking-wide">
                        J'ai un code
                    </a>
                    <a href="/admin" class="text-sm font-medium text-zinc-500 hover:text-zinc-300 transition-colors">
                        Admin
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/5 py-12">
        <div class="max-w-7xl mx-auto px-6 lg:px-12">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-6 h-6 bg-champagne flex items-center justify-center">
                        <i data-lucide="sparkles" class="w-3 h-3 text-noir"></i>
                    </div>
                    <span class="font-heading text-lg text-white">NumStore</span>
                </div>
                <p class="text-xs text-zinc-600">
                    NumStore — Produits Numériques & Digitalisation Professionnelle
                </p>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
